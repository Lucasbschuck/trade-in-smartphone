spring:
  application:
    name: trade-in-smartphone-service
  datasource:
    url: jdbc:h2:file:./data/trade-in-smartphone
    username: sa
    password:
    driverClassName: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
  h2:
    console:
      enabled: true
      path: /h2-console
